<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bundt Cake Icon -->
  <g transform="translate(10, 20)">
    <!-- Cake base -->
    <ellipse cx="20" cy="35" rx="18" ry="6" fill="#D97757" opacity="0.3"/>
    <!-- Cake body -->
    <path d="M 4 35 Q 4 20 20 15 Q 36 20 36 35 L 36 32 Q 36 20 20 18 Q 4 20 4 32 Z" fill="#7BA05B"/>
    <!-- Cake ridges -->
    <path d="M 8 30 Q 8 22 20 20 Q 32 22 32 30" stroke="#5D4E37" stroke-width="0.5" fill="none" opacity="0.4"/>
    <path d="M 10 26 Q 10 20 20 18.5 Q 30 20 30 26" stroke="#5D4E37" stroke-width="0.5" fill="none" opacity="0.4"/>
    <!-- Center hole -->
    <ellipse cx="20" cy="25" rx="4" ry="3" fill="#FAF7F2"/>
    <ellipse cx="20" cy="25" rx="4" ry="2" fill="#EDE4D8"/>
    <!-- Decorative dots (dates/fruits) -->
    <circle cx="14" cy="26" r="1.5" fill="#5D4E37" opacity="0.6"/>
    <circle cx="26" cy="28" r="1.5" fill="#5D4E37" opacity="0.6"/>
    <circle cx="18" cy="32" r="1" fill="#5D4E37" opacity="0.5"/>
    <circle cx="24" cy="24" r="1" fill="#5D4E37" opacity="0.5"/>
  </g>

  <!-- Text: Zizou's -->
  <text x="55" y="38" font-family="'Playfair Display', serif" font-size="28" font-weight="600" fill="#5D4E37">
    Zizou's
  </text>

  <!-- Text: Healthy Bakes -->
  <text x="55" y="60" font-family="'Inter', sans-serif" font-size="16" font-weight="400" fill="#7BA05B" letter-spacing="1">
    HEALTHY BAKES
  </text>

  <!-- Decorative leaf accent -->
  <g transform="translate(160, 34)">
    <path d="M 0 0 Q 3 -2 6 0 Q 3 2 0 0" fill="#7BA05B" opacity="0.6"/>
    <path d="M 2 0 L 4 0" stroke="#5D4E37" stroke-width="0.3" opacity="0.4"/>
  </g>
</svg>
